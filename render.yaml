# Render.com deployment — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ultimatum-game
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ADMIN_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: ultimatum-data
      mountPath: /var/data
      sizeGB: 1
