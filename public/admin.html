<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Ultimatum Game Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="bg-grid"></div>

  <!-- Login -->
  <section id="login-screen" class="admin-screen active">
    <div class="card admin-login-card">
      <div class="badge">Experiment Admin</div>
      <h1>博弈数据后台</h1>
      <p class="subtitle">输入管理员密钥以查看实验记录</p>
      <input type="password" id="admin-key-input" class="input" placeholder="Admin Key" autocomplete="off">
      <button id="btn-login" class="btn btn--primary btn--block">进入后台</button>
      <p class="login-error hidden" id="login-error">密钥错误</p>
      <a href="/" class="back-link">← 返回游戏</a>
    </div>
  </section>

  <!-- Dashboard -->
  <section id="dashboard-screen" class="admin-screen">
    <header class="admin-header">
      <div>
        <h1>博弈数据后台</h1>
        <p class="admin-sub">Dynamic Ultimatum Game — 实验记录</p>
      </div>
      <div class="admin-header-actions">
        <button id="btn-refresh" class="btn btn--secondary">刷新</button>
        <a id="btn-export" class="btn btn--ghost" href="#">导出 CSV</a>
        <a href="/" class="btn btn--ghost">游戏</a>
        <button id="btn-logout" class="btn btn--ghost">退出</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <span class="stat-label">总轮次</span>
        <span class="stat-value" id="stat-rounds">—</span>
      </div>
      <div class="stat-card stat-card--green">
        <span class="stat-label">接受率</span>
        <span class="stat-value" id="stat-accept">—</span>
      </div>
      <div class="stat-card stat-card--red">
        <span class="stat-label">拒绝</span>
        <span class="stat-value" id="stat-reject">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">超时</span>
        <span class="stat-value" id="stat-timeout">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">平均提议者分得</span>
        <span class="stat-value" id="stat-avg-prop">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">平均接受者分得</span>
        <span class="stat-value" id="stat-avg-resp">—</span>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar card">
      <label>按房间筛选</label>
      <input type="text" id="filter-room" class="input input--code" placeholder="房间码" maxlength="4">
      <button id="btn-filter" class="btn btn--secondary">筛选</button>
      <button id="btn-clear-filter" class="btn btn--ghost">清除</button>
    </div>

    <!-- Table -->
    <div class="table-wrap card">
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>房间</th>
            <th>轮次</th>
            <th>总额</th>
            <th>提议者</th>
            <th>接受者</th>
            <th>提议者分得</th>
            <th>接受者分得</th>
            <th>结果</th>
            <th>P1收益</th>
            <th>P2收益</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="11" class="empty-row">暂无数据</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
</html>
